<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background circle with brand color #2497DE -->
  <rect width="512" height="512" rx="128" fill="#2497DE" />
  
  <!-- Outer subtle circular highlight -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.15" />
  
  <!-- Stylized windshield outline (Caninana Auto Vidros) -->
  <path d="M 120,340 C 130,220 180,180 256,180 C 332,180 382,220 392,340 C 310,350 202,350 120,340 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="24" 
        stroke-linejoin="round" 
        stroke-linecap="round" />
  
  <path d="M 140,240 C 180,210 210,205 256,205 C 302,205 332,210 372,240" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="12" 
        stroke-opacity="0.5" 
        stroke-linecap="round" />

  <!-- Barcode horizontal lines (Coletor) -->
  <g transform="translate(176, 260)" fill="#ffffff">
    <rect x="0" y="0" width="8" height="48" rx="2" />
    <rect x="16" y="0" width="18" height="48" rx="3" />
    <rect x="42" y="0" width="6" height="48" rx="1.5" />
    <rect x="56" y="0" width="12" height="48" rx="2.5" />
    <rect x="76" y="0" width="24" height="48" rx="4" />
    <rect x="108" y="0" width="8" height="48" rx="2" />
    <rect x="124" y="0" width="14" height="48" rx="3" />
    <rect x="146" y="0" width="14" height="48" rx="3" />
  </g>

  <!-- Laser scanning horizontal beam (feedback highlight) -->
  <line x1="80" y1="284" x2="432" y2="284" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
  <line x1="80" y1="284" x2="432" y2="284" stroke="#e0f2fe" stroke-width="4" stroke-linecap="round" />
  
  <!-- Glowing target corner scopes -->
  <path d="M 80,130 L 80,80 L 130,80" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 432,130 L 432,80 L 382,80" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 80,382 L 80,432 L 130,432" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 432,382 L 432,432 L 382,432" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
</svg>
